<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online form</title>
    <link rel="stylesheet" href="job.css">
</head>

<body>
    <div class="container">
        <div class="form">
            <h1>Job Application (web)</h1>
            <form action="">
                <div class="form_container">
                    <div class="form_control">
                        <label for="first_name">
                            First Name
                        </label>
                        <input name="name" id="first_name" placeholder="Enter your name">
                    </div>
                    <div class="form_control">
                        <label for="last_name">
                            Last Name
                        </label>
                        <input name="last_name" id="last_name" placeholder="Enter your last name">
                    </div>
                    <div class="form_control">
                        <label for="email">
                            Email
                        </label>
                        <input type="email" name="email" id="email" placeholder="Enter your email">
                    </div>
                    <div class="form_control">
                        <label for="job_role">
                            Job Role
                        </label>
                        <select name="job" id="job_role">
                            <option value="">Select your job role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="full_stack">Full Stack Developer</option>
                            <option value="ui_ux">UI UX Designer</option>
                        </select>
                    </div>
                    <div class="form_control">
                        <label for="address">
                            Address
                        </label>
                        <textarea name="addr" id="address" rows="4" cols="50" placeholder="Enter address">
                        Enter Address
                    </textarea>
                    </div>

                    <div class="form_control">
                        <label for="City">
                            City
                        </label>
                        <input type="text" name="city" id="City" placeholder="Enter city">
                    </div>

                    <div class="form_control">
                        <label for="pin">
                            Pin Code    
                        </label>
                        <input type="number" name="pin" id="pin" placeholder="Enter pin">
                    </div>
                    <div class="form_control">
                        <label for="date">
                            Date
                        </label>
                        <input type="date" value="2022-10-12" name="date" id="date" >
                    </div>
                    <div class="form_control">
                        <label for="file">
                            Upload Your CV
                        </label>
                        <input type="file" name="file" id="file">
                    </div>
                </div>
                <div class="btn_container">
                <button type="submit">
                    Apply
                </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
